<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Contato</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="form-container">
    <h2>Contato</h2>

    <form action="#" method="post">
      
      <label for="nome">Nome</label>
      <input id="nome" type="text" name="nome" placeholder="Seu nome" required>

      <label for="email">Email</label>
      <input id="email" type="email" name="email" placeholder="Seu email" required>

      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" rows="4" placeholder="Sua mensagem" required></textarea>

      <button type="submit">Enviar</button>
    </form>
  </div>

</body>
</html>
