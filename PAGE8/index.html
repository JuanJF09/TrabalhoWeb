<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Produto Minimalista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <article class="cartao-produto">
        <img src="imagens/headphone.jpg" alt="Imagem do Produto" class="foto-produto">
        
        <div class="detalhes-produto">
            <h2 class="nome-produto">Headphone Premium</h2>
            <p class="descricao-produto">
                Experiência sonora imersiva com cancelamento de ruído ativo e 40 horas de bateria. O conforto que seus ouvidos merecem.
            </p>
            <span class="preco-produto">R$ 599,00</span>
            
            <button class="botao-comprar">Comprar Agora</button>
        </div>
    </article>

</body>
</html>
