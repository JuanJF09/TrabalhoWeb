<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página de Login</title>

  <style>

    * {
  box-sizing: border-box;
}

form {
  width: 100%;
}

    body {
      background: linear-gradient(135deg, #007BFF, #00c6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .login-container {
      background: #fff;
      padding: 30px 25px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      
      border: 2px solid #007BFF;
      
      border-radius: 5px;
      outline: none;
      display: block;
    }

    input:focus {
      border-color: #0056b3;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      display: block;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Login</h2>

    <form>
      <input type="text" placeholder="Usuário" required>
      <input type="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
  </div>

</body>
</html>
