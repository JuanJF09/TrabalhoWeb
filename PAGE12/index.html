<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galeria Elegante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Galeria de Momentos</h1>
    <p class="aviso-instrucao">Clique na imagem para expandir</p>

    <main class="grade-galeria">
        
        <label>
            <input type="checkbox" class="alternar-zoom">
            <figure>
                <img src="imagens/foto1.jpg" alt="Paisagem Natural">
                <figcaption>Exploração na Natureza</figcaption>
            </figure>
        </label>

        <label>
            <input type="checkbox" class="alternar-zoom">
            <figure>
                <img src="imagens/foto2.jpg" alt="Arquitetura">
                <figcaption>Arquitetura Urbana</figcaption>
            </figure>
        </label>

        <label>
            <input type="checkbox" class="alternar-zoom">
            <figure>
                <img src="imagens/foto3.jpg" alt="Tecnologia">
                <figcaption>Inovação Digital</figcaption>
            </figure>
        </label>

        <label>
            <input type="checkbox" class="alternar-zoom">
            <figure>
                <img src="imagens/foto4.jpg" alt="Café">
                <figcaption>Pausa para o Café</figcaption>
            </figure>
        </label>

    </main>

</body>
</html>
