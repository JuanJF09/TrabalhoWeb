<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lançamento de Produto</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Lançamento Poco X8</h1>

  
    <img src="https://tm.ibxk.com.br/2026/02/19/poco_x8_pro_vazado_b4281c1a65.jpg" class="product-img">

  
    <p>Faltam:</p>
    <time id="countdown" class="countdown" datetime="2026-04-15T00:00:00"></time>

   
    <h3>Recursos</h3>
    <ul>
      <li>Alta performance</li>
      <li>Câmera avançada</li>
      <li>Bateria durável</li>
    </ul>

     <h3>Pré-venda</h3>
    <form>
      <input type="text" placeholder="Nome" required>
      <input type="email" placeholder="Email" required>
      <button type="submit">Comprar</button>
    </form>
  </div>

  <script>
    const el = document.getElementById("countdown");
    const target = new Date(el.getAttribute("datetime")).getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = target - now;

      if (diff < 0) {
        el.textContent = "Lançado!";
        return;
      }

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
      const m = Math.floor((diff % (1000*60*60)) / (1000*60));
      const s = Math.floor((diff % (1000*60)) / 1000);

      el.textContent = d+"d "+h+"h "+m+"m "+s+"s";
    }, 1000);
  </script>

</body>
</html>
