<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa do Site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #007BFF, #00c6ff);
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    /* ✅ PROPRIEDADE EXIGIDA */
    li {
      text-indent: 10px;
      margin: 5px 0;
    }

    /* Hierarquia (árvore) */
    ul ul li {
      text-indent: 25px;
    }

    ul ul ul li {
      text-indent: 40px;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>Mapa do Site</h2>

    <ul>
      <li>Home</li>
      <li>Sobre
        <ul>
          <li>Equipe</li>
          <li>História</li>
        </ul>
      </li>
      <li>Serviços
        <ul>
          <li>Web Design</li>
          <li>Desenvolvimento
            <ul>
              <li>Front-end</li>
              <li>Back-end</li>
            </ul>
          </li>
        </ul>
      </li>
      <li>Contato</li>
    </ul>

  </div>

</body>
</html>
